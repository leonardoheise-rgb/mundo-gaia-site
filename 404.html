<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada | App Mundo Gaia</title>
    <meta
      name="description"
      content="A página que você tentou acessar não foi encontrada no site do App Mundo Gaia."
    />
    <link rel="icon" href="/assets/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="bg-orb bg-orb--one"></div>
      <div class="bg-orb bg-orb--two"></div>
      <div class="bg-orb bg-orb--three"></div>

      <main class="hero">
        <div class="container split-panel" data-reveal>
          <div class="panel-text">
            <span class="eyebrow">Página não encontrada</span>
            <h1>Parece que você se perdeu no mundo da Gaia.</h1>
            <p>
              A página que você tentou acessar não foi encontrada. Vamos voltar
              para a página principal?
            </p>
            <div class="hero__actions">
              <a class="button button--primary" href="/">Voltar para o início</a>
            </div>
          </div>
          <div class="panel-image">
            <img
              src="/assets/coruja-muro.png"
              alt="Ilustração da coruja Gaia."
            />
          </div>
        </div>
      </main>
    </div>

    <script src="/script.js" defer></script>
  </body>
</html>
